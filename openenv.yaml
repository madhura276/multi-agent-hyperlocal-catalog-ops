name: multi_agent_hyperlocal_catalog_ops
description: Multi-agent OpenEnv benchmark for collaborative hyperlocal inventory curation, duplicate resolution, pricing audit, and oversight.
entrypoint: multi_agent_hyperlocal_catalog_ops.server.app:app
environment_class: multi_agent_hyperlocal_catalog_ops.server.environment:MultiAgentHyperlocalCatalogOpsEnvironment

metadata:
  title: Multi-Agent Hyperlocal Catalog Ops
  emoji: "🛒"
  category: professional_tasks
  primary_theme: multi_agent_interactions
  secondary_theme: world_modeling
  domain: quick_commerce
  tags:
    - openenv
    - multi-agent
    - oversight
    - quick-commerce
    - inventory-curation
    - catalog-ops

runtime:
  host: 0.0.0.0
  port: 8000

evaluation:
  deterministic_tasks: true
  reward_type: shaped
  score_range: [0.0, 1.0]

tasks:
  - easy_single_store_cleanup
  - medium_multistore_conflict
  - hard_ambiguous_oversight_batch
